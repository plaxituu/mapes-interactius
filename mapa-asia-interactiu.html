<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa interactiu d'Àsia — països, banderes i capitals</title>
<style>
  :root{
    --orange:#E8830C;
    --orange-light:#FCD9A8;
    --bg:#f7f5f0;
    --text:#2C2C2A;
    --text-soft:#5F5E5A;
    --border:rgba(0,0,0,.12);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);
    color:var(--text);
    padding:24px 16px;
  }
  .wrap{max-width:1000px;margin:0 auto;}
  h1{font-size:22px;font-weight:600;margin:0 0 4px;}
  p.sub{font-size:14px;color:var(--text-soft);margin:0 0 20px;}
  .toolbar{
    display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px;
  }
  input[type="text"]{
    flex:1;min-width:180px;height:38px;padding:0 12px;font-size:14px;
    border:1px solid var(--border);border-radius:8px;background:#fff;color:var(--text);
    outline:none;
  }
  input[type="text"]:focus{border-color:var(--orange);}
  button{
    height:38px;padding:0 16px;font-size:14px;cursor:pointer;
    border:1px solid var(--border);border-radius:8px;background:#fff;color:var(--text);
    transition:background .15s;
  }
  button:hover{background:#f0ede6;}
  .lang{display:inline-flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;}
  .lang button{border:none;border-radius:0;height:38px;}
  .lang button.active{background:var(--orange);color:#fff;}
  .mapbox{
    position:relative;background:#fff;border:1px solid var(--border);
    border-radius:12px;padding:8px;min-height:380px;
  }
  #loadmsg{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-size:14px;color:var(--text-soft);
  }
  svg#map{width:100%;height:auto;display:block;}
  .foot{font-size:12px;color:var(--text-soft);margin-top:14px;text-align:center;}

  /* modal bandera gran */
  .overlay{
    position:fixed;inset:0;background:rgba(0,0,0,.5);
    display:none;align-items:center;justify-content:center;z-index:50;padding:16px;
  }
  .overlay.open{display:flex;}
  .modal{
    background:#fff;border:3px solid var(--orange);border-radius:14px;
    padding:24px;max-width:520px;width:100%;text-align:center;position:relative;
  }
  .modal h2{font-size:30px;font-weight:700;margin:0 0 2px;color:var(--text);}
  .modal .cap{font-size:17px;color:var(--text-soft);margin:0 0 18px;}
  .modal img{
    width:100%;max-width:440px;height:auto;border:1px solid var(--border);border-radius:8px;
  }
  .modal .close{
    position:absolute;top:10px;right:12px;width:34px;height:34px;line-height:1;
    border-radius:8px;border:1px solid var(--border);background:#fff;cursor:pointer;
    font-size:20px;color:var(--text-soft);
  }
  .modal .close:hover{background:#f0ede6;}
  .modal .hint{font-size:12px;color:var(--text-soft);margin:14px 0 0;}
</style>
</head>
<body>
<div class="wrap">
  <h1 data-i18n="title">Mapa interactiu d'Àsia</h1>
  <p class="sub" data-i18n="sub">Passa el ratolí per sobre de cada país per veure'n el nom, la capital i la bandera.</p>

  <div class="toolbar">
    <input id="search" type="text" placeholder="Cerca un país…">
    <button id="reset-btn" data-i18n="reset">Veure tot</button>
    <span class="lang">
      <button id="lang-ca" class="active">CAT</button>
      <button id="lang-es">CAST</button>
    </span>
  </div>

  <div class="mapbox">
    <div id="loadmsg" data-i18n="loading">Carregant el mapa…</div>
    <svg id="map" viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg" role="img">
      <title>Mapa d'Àsia</title>
    </svg>
  </div>

  <p class="foot" data-i18n="foot">Mapa per a estudi · països, capitals i banderes d'Àsia</p>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <button class="close" id="modal-close" aria-label="Tancar">×</button>
    <h2 id="modal-name"></h2>
    <p class="cap" id="modal-cap"></p>
    <img id="modal-flag" alt="">
    <p class="hint" id="modal-hint">Clica fora o prem Esc per tancar</p>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<script>
(function(){
  // clau dataset : [ nom CA, nom ES, capital CA, capital ES, ISO2 ]
  const DATA = {
    "Turkey":["Turquia","Turquía","Ankara","Ankara","tr"],
    "Georgia":["Geòrgia","Georgia","Tbilisi","Tiflis","ge"],
    "Armenia":["Armènia","Armenia","Erevan","Ereván","am"],
    "Azerbaijan":["Azerbaidjan","Azerbaiyán","Bakú","Bakú","az"],
    "Syria":["Síria","Siria","Damasc","Damasco","sy"],
    "Lebanon":["Líban","Líbano","Beirut","Beirut","lb"],
    "Israel":["Israel","Israel","Jerusalem","Jerusalén","il"],
    "Jordan":["Jordània","Jordania","Amman","Amán","jo"],
    "Iraq":["Iraq","Irak","Bagdad","Bagdad","iq"],
    "Kuwait":["Kuwait","Kuwait","Kuwait","Kuwait","kw"],
    "Saudi Arabia":["Aràbia Saudita","Arabia Saudí","Riad","Riad","sa"],
    "Yemen":["Iemen","Yemen","Sanà","Saná","ye"],
    "Oman":["Oman","Omán","Mascat","Mascate","om"],
    "United Arab Emirates":["Emirats Àrabs Units","Emiratos Árabes Unidos","Abu Dhabi","Abu Dabi","ae"],
    "Qatar":["Qatar","Catar","Doha","Doha","qa"],
    "Iran":["Iran","Irán","Teheran","Teherán","ir"],
    "Kazakhstan":["Kazakhstan","Kazajistán","Astanà","Astaná","kz"],
    "Uzbekistan":["Uzbekistan","Uzbekistán","Taixkent","Taskent","uz"],
    "Turkmenistan":["Turkmenistan","Turkmenistán","Aixkhabad","Asjabad","tm"],
    "Tajikistan":["Tadjikistan","Tayikistán","Duixanbé","Dusambé","tj"],
    "Kyrgyzstan":["Kirguizistan","Kirguistán","Bixkek","Biskek","kg"],
    "Afghanistan":["Afganistan","Afganistán","Kabul","Kabul","af"],
    "Pakistan":["Pakistan","Pakistán","Islamabad","Islamabad","pk"],
    "India":["Índia","India","Nova Delhi","Nueva Delhi","in"],
    "Nepal":["Nepal","Nepal","Katmandú","Katmandú","np"],
    "Bhutan":["Bhutan","Bután","Thimphu","Thimphu","bt"],
    "Bangladesh":["Bangladesh","Bangladés","Dacca","Daca","bd"],
    "Sri Lanka":["Sri Lanka","Sri Lanka","Sri Jayawardenepura Kotte","Sri Jayawardenepura Kotte","lk"],
    "Myanmar":["Myanmar","Birmània/Myanmar","Naypyidaw","Naipyidó","mm"],
    "Thailand":["Tailàndia","Tailandia","Bangkok","Bangkok","th"],
    "Laos":["Laos","Laos","Vientiane","Vientián","la"],
    "Vietnam":["Vietnam","Vietnam","Hanoi","Hanói","vn"],
    "Cambodia":["Cambodja","Camboya","Phnom Penh","Nom Pen","kh"],
    "Malaysia":["Malàisia","Malasia","Kuala Lumpur","Kuala Lumpur","my"],
    "Brunei":["Brunei","Brunéi","Bandar Seri Begawan","Bandar Seri Begawan","bn"],
    "Indonesia":["Indonèsia","Indonesia","Jakarta","Yakarta","id"],
    "Philippines":["Filipines","Filipinas","Manila","Manila","ph"],
    "Mongolia":["Mongòlia","Mongolia","Ulan Bator","Ulán Bator","mn"],
    "China":["Xina","China","Pequín","Pekín","cn"],
    "North Korea":["Corea del Nord","Corea del Norte","Pyongyang","Pionyang","kp"],
    "South Korea":["Corea del Sud","Corea del Sur","Seül","Seúl","kr"],
    "Japan":["Japó","Japón","Tòquio","Tokio","jp"],
    "Timor-Leste":["Timor Oriental","Timor Oriental","Dili","Dili","tl"]
  };
  const ALIAS = {
    "Dem. Rep. Korea":"North Korea","Korea":"South Korea","Republic of Korea":"South Korea",
    "Lao PDR":"Laos","Viet Nam":"Vietnam","Brunei Darussalam":"Brunei",
    "Syrian Arab Republic":"Syria","Iran (Islamic Republic of)":"Iran","East Timor":"Timor-Leste"
  };

  // textos d'interfície
  const I18N = {
    ca:{title:"Mapa interactiu d'Àsia",
        sub:"Passa el ratolí per sobre de cada país per veure'n el nom, la capital i la bandera.",
        reset:"Veure tot", loading:"Carregant el mapa…",
        foot:"Mapa per a estudi · països, capitals i banderes d'Àsia",
        search:"Cerca un país…", cap:"Capital"},
    es:{title:"Mapa interactivo de Asia",
        sub:"Pasa el ratón por encima de cada país para ver su nombre, capital y bandera.",
        reset:"Ver todo", loading:"Cargando el mapa…",
        foot:"Mapa de estudio · países, capitales y banderas de Asia",
        search:"Busca un país…", cap:"Capital"}
  };

  let LANG="ca"; // 'ca' o 'es'
  function nameOf(k){ return LANG==="ca"?DATA[k][0]:DATA[k][1]; }
  function capOf(k){ return LANG==="ca"?DATA[k][2]:DATA[k][3]; }
  function resolve(n){ return DATA[n]?n:(ALIAS[n]||null); }

  const NS="http://www.w3.org/2000/svg", XL="http://www.w3.org/1999/xlink";
  const svg=d3.select("#map"), loadmsg=document.getElementById("loadmsg");
  let card,tName,tCap,fimg,path,feats,gPaths;
  const CW=240,CH=122,PAD=12;

  d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json").then(topo=>{
    const all=topojson.feature(topo,topo.objects.countries).features;
    feats=all.filter(f=>resolve(f.properties.name));
    const proj=d3.geoMercator().fitSize([1000,700],{type:"FeatureCollection",features:feats});
    path=d3.geoPath(proj);
    loadmsg.style.display="none";

    gPaths=svg.append("g");

    card=svg.append("g").style("display","none").style("pointer-events","none");
    const cbg=document.createElementNS(NS,"rect");
    cbg.setAttribute("width",CW);cbg.setAttribute("height",CH);
    cbg.setAttribute("rx","6");cbg.setAttribute("fill","#fff");
    cbg.setAttribute("stroke","#E8830C");cbg.setAttribute("stroke-width","2.5");
    tName=document.createElementNS(NS,"text");
    tName.setAttribute("x",PAD);tName.setAttribute("y",30);
    tName.setAttribute("font-size","20");tName.setAttribute("font-weight","600");
    tName.setAttribute("fill","#2C2C2A");
    tCap=document.createElementNS(NS,"text");
    tCap.setAttribute("x",PAD);tCap.setAttribute("y",50);
    tCap.setAttribute("font-size","13");tCap.setAttribute("fill","#5F5E5A");
    fimg=document.createElementNS(NS,"image");
    const FW=CW-PAD*2,FH=54;
    fimg.setAttribute("x",PAD);fimg.setAttribute("y",CH-FH-PAD);
    fimg.setAttribute("width",FW);fimg.setAttribute("height",FH);
    fimg.setAttribute("preserveAspectRatio","xMidYMid meet");
    card.node().appendChild(cbg);card.node().appendChild(tName);
    card.node().appendChild(tCap);card.node().appendChild(fimg);

    gPaths.selectAll("path").data(feats).enter().append("path")
      .attr("d",path)
      .attr("fill","#FCD9A8").attr("stroke","#E8830C").attr("stroke-width",0.6)
      .style("cursor","pointer")
      .each(function(f){ f._key=resolve(f.properties.name); })
      .on("mouseenter",function(e,f){ d3.select(this).attr("fill","#E8830C"); showCard(f); })
      .on("mouseleave",function(){ d3.select(this).attr("fill","#FCD9A8"); card.style("display","none"); })
      .on("click",function(e,f){ openModal(f._key); });

    applyLang();
  }).catch(()=>{ loadmsg.textContent="No s'ha pogut carregar el mapa. Comprova la connexió i torna-ho a provar."; });

  function showCard(f){
    const k=f._key;
    tName.textContent=nameOf(k);
    tCap.textContent=I18N[LANG].cap+": "+capOf(k);
    fimg.setAttributeNS(XL,"href","https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.2.3/flags/4x3/"+DATA[k][4]+".svg");
    const c=path.centroid(f);
    let x=c[0]+10,y=c[1]-CH-10;
    if(x+CW>1000)x=1000-CW-4;
    if(x<4)x=4;
    if(y<4)y=c[1]+14;
    if(y+CH>700)y=700-CH-4;
    card.attr("transform","translate("+x+","+y+")").style("display",null);
    card.raise();
  }

  function applyLang(){
    document.querySelectorAll("[data-i18n]").forEach(el=>{
      const key=el.getAttribute("data-i18n");
      if(I18N[LANG][key]) el.textContent=I18N[LANG][key];
    });
    document.getElementById("search").placeholder=I18N[LANG].search;
    document.documentElement.lang=LANG;
  }

  // cerca
  document.getElementById("search").addEventListener("input",function(){
    const q=this.value.trim().toLowerCase();
    if(!gPaths) return;
    gPaths.selectAll("path").attr("fill",f=>(q.length>1 && nameOf(f._key).toLowerCase().includes(q))?"#E8830C":"#FCD9A8");
    if(q.length>1){
      const m=feats.find(f=>nameOf(f._key).toLowerCase().includes(q));
      if(m) showCard(m); else card.style("display","none");
    } else card.style("display","none");
  });
  document.getElementById("reset-btn").addEventListener("click",function(){
    document.getElementById("search").value="";
    if(gPaths) gPaths.selectAll("path").attr("fill","#FCD9A8");
    if(card) card.style("display","none");
  });

  // idioma
  function setLang(l){
    LANG=l;
    document.getElementById("lang-ca").classList.toggle("active",l==="ca");
    document.getElementById("lang-es").classList.toggle("active",l==="es");
    applyLang();
    if(card) card.style("display","none");
    document.getElementById("search").value="";
    if(gPaths) gPaths.selectAll("path").attr("fill","#FCD9A8");
  }
  document.getElementById("lang-ca").addEventListener("click",()=>setLang("ca"));
  document.getElementById("lang-es").addEventListener("click",()=>setLang("es"));

  // ---- modal bandera gran ----
  const overlay=document.getElementById("overlay");
  const mName=document.getElementById("modal-name");
  const mCap=document.getElementById("modal-cap");
  const mFlag=document.getElementById("modal-flag");
  const mHint=document.getElementById("modal-hint");
  function openModal(k){
    mName.textContent=nameOf(k);
    mCap.textContent=I18N[LANG].cap+": "+capOf(k);
    mFlag.src="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.2.3/flags/4x3/"+DATA[k][4]+".svg";
    mFlag.alt=nameOf(k);
    mHint.textContent = LANG==="ca" ? "Clica fora o prem Esc per tancar" : "Haz clic fuera o pulsa Esc para cerrar";
    overlay.classList.add("open");
  }
  function closeModal(){ overlay.classList.remove("open"); }
  document.getElementById("modal-close").addEventListener("click",closeModal);
  overlay.addEventListener("click",function(e){ if(e.target===overlay) closeModal(); });
  document.addEventListener("keydown",function(e){ if(e.key==="Escape") closeModal(); });
})();
</script>
</body>
</html>
